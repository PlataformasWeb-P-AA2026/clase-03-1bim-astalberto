<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Demo Jquery</title>
  <script src="https://code.jquery.com/jquery-3.5.0.js"></script>
</head>

<body>
  <h1>Ejemplo de Uso de Jquery</h1>
  <p id="mensajeFinal">
  </p>
  <button type="submit" id="obtenerInformacion">Obtener información</button>
  <button type="submit" id="limpiarInformacion">Limpiar información</button>
</body>
<script>
  $(document).ready(function () {
    var url = "data/data_instituciones.json"; 
    // Se necesita ejecutar un servidor local para el correcto funcionamiento como: python3 -m http.server 8000
    $("#obtenerInformacion").click(function () {
      $.ajax({
        dataType: 'json',
        url: url
      }).then(function (data) {
        for (var i = 0; i < data.length; i++) {
          console.log(data[i]);
          $('#mensajeFinal').append(
            "<ul><li>" +
            "<b>AMIE:</b> " + data[i].AMIE + " | " +
            "<b>Nombre:</b> " + data[i]["Nombre-Educativa"] + " | " +
            "<b>Provincia:</b> " + data[i].Provincia + " | " +
            "<b>Cantón:</b> " + data[i].Canton + " | " +
            "<b>Parroquia:</b> " + data[i].Parroquia + " | " +
            "<b>Zona:</b> " + data[i].ZonaAdministrativa + " | " +
            "<b>Distrito:</b> " + data[i].CodigoDistrito + " | " +
            "<b>Sostenimiento:</b> " + data[i].Sostenimiento + " | " +
            "<b>Régimen:</b> " + data[i].RegimenEscolar + " | " +
            "<b>Modalidad:</b> " + data[i].Modalidad + " | " +
            "<b>Jornada:</b> " + data[i].Jornada + " | " +
            "<b>Nivel:</b> " + data[i].Nivel + " | " +
            "<b>Etnia:</b> " + data[i].Etnia + " | " +
            "<b>Estudiantes:</b> " + data[i].Numeroestudiantes + " | " +
            "<b>Docentes:</b> " + data[i].Numerodocentes + " | " +
            "<b>Estado:</b> " + data[i].Estado +
            "</ul></li>"
          );
        }
      });
    });
    $("#limpiarInformacion").click(function () {
      $('#mensajeFinal').empty();
    });
  });
</script>

</html>
